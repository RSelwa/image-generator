name: 🧪 E2E Tests Front

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/e2e-front.yml
      - apps/front/**
      - libs/**
      - functions/create-user-document
      - functions/lobby-presence

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  init:
    runs-on: ubuntu-latest
    name: ⚙️ Initialize Node.js Environment
    if: github.event_name != 'release'
    outputs:
      playwright-version: ${{ steps.playwright-version.outputs.version }}
    steps:
      - name: ✨ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Initialize Node.js Environment
        uses: ./.github/actions/initialization

      - name: 🔍 Get Playwright version
        id: playwright-version
        shell: bash
        run: echo "version=$(pnpm --filter @repo/front exec playwright --version | tail -1)" >> "$GITHUB_OUTPUT"

      - name: 📦 Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ steps.playwright-version.outputs.version }}

      - name: 🎭 Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @repo/front exec playwright install --with-deps chromium

  e2e:
    needs: init
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip_e2e]' ) }}
    name: 🧪 E2E Tests - ${{ matrix.suite }}
    environment: prod
    strategy:
      matrix:
        include:
          - suite: auth
            path: auth
          - suite: demo
            path: demo
          - suite: lobby
            path: lobby/
          - suite: lobby-playing
            path: lobby-playing
          - suite: daily-challenge
            path: daily-challenge
          - suite: race
            path: race
      fail-fast: false
    steps:
      - name: ✨ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Initialize Node.js Environment
        uses: ./.github/actions/initialization

      - name: 📦 Restore Playwright browsers cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ needs.init.outputs.playwright-version }}

      - name: 🎭 Install Playwright system dependencies
        run: pnpm --filter @repo/front exec playwright install-deps chromium

      - name: ⚙️ Install Firebase tools
        run: pnpm install -g firebase-tools

      - name: 📦 Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}

      - name: 📦 Build libs
        run: pnpm build:libs

      - name: 📦 Build functions
        run: pnpm build:functions

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🧪 Run E2E Tests - ${{ matrix.suite }}
        run: firebase emulators:exec --project "$GCLOUD_PROJECT" 'pnpm --filter @repo/front e2e -- e2e/${{ matrix.path }}'
        env:
          GCLOUD_PROJECT: ${{ secrets.PROJECT_ID }}

      - name: 📊 Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.suite }}
          path: apps/front/playwright-report/
          retention-days: 30

  e2e-complete:
    needs: e2e
    runs-on: ubuntu-latest
    name: ✅ E2E Tests Complete
    if: ${{ always() && (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') }}
    
    steps:
      - name: ✅ All E2E tests passed or skipped
        run: echo "E2E passed or skipped"
      - name: ❌ Some E2E tests failed
        if: ${{ needs.e2e.result != 'success' && needs.e2e.result != 'skipped' }}
        run: exit 1


  deploy:
    needs: e2e-complete
    runs-on: ubuntu-latest
    if: ${{ always() && ( github.ref_name == 'main' || github.ref_name == 'develop' || contains(github.event.head_commit.message, '[force_deploy]')) }}
    steps:
      - uses: actions/checkout@v4  # needed to access the composite action
      - name: Deploy
        uses: ./.github/actions/deploy
        with:
          environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
          branch: ${{ github.ref_name }}
          vps_host: ${{ secrets.VPS_HOST }}
          vps_user: ${{ secrets.VPS_USER }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}