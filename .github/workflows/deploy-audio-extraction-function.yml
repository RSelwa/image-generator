name: 🚀 Deploy audio-extraction Cloud Function

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/deploy-audio-extraction-function.yml
      - functions/audio-extraction/**
      - libs/common/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: 🚀 Deploy audio-extraction Cloud Function
    if: github.ref_name == 'main' || github.ref_name == 'develop'
    environment: prod
    steps:
      - name: ✨ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Initialize Python Environment
        uses: ./.github/actions/python-initialization

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ⚙️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 🐳 Build and push Docker image
        run: |
          BUILD_ID=$(gcloud builds submit \
            --config functions/audio-extraction/cloudbuild.yaml \
            --project ${{ secrets.PROJECT_ID }} \
            --async \
            --format='value(id)')
          echo "Build submitted: $BUILD_ID"
          echo "Waiting for build to complete..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project ${{ secrets.PROJECT_ID }} \
              --format='value(status)')
            echo "Build status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Build completed successfully!"
              break
            elif [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "INTERNAL_ERROR" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 10
          done

      - name: ⚙️ Install Firebase tools
        run: npm install -g firebase-tools

      - name: 🚀 Deploy to Firebase
        run: npx firebase deploy --project "$PROJECT_ID" --only functions:audio-extraction --force
        env:
          PROJECT_ID: ${{ secrets.PROJECT_ID }}

      - name: ✅ Deployment complete
        run: echo "Audio extraction function deployed successfully!"
